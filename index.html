<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XREZZKY Ω-CHECKER V37.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #050507;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(10, 10, 12, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-dark {
            background: rgba(5, 5, 7, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .accent-gradient {
            background: linear-gradient(135deg, #ff0055 0%, #7000ff 100%);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .user-item {
            transition: all 0.2s ease;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .user-item:hover {
            transform: translateX(5px);
            border-left-color: #ff0055;
            background: rgba(255, 0, 85, 0.1);
        }
        .user-item.selected {
            border-left-color: #ff0055;
            background: linear-gradient(90deg, rgba(255,0,85,0.2) 0%, rgba(255,0,85,0) 100%);
        }
        
        .password-card {
            transition: all 0.3s ease;
            min-width: 280px;
            max-width: 280px;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }
        .password-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #ff0055 !important;
            box-shadow: 0 10px 25px -5px rgba(255, 0, 85, 0.3);
        }
        
        .password-card.copied {
            opacity: 0.5;
            filter: grayscale(0.5);
            border-color: #ff0000 !important;
            pointer-events: none;
        }
        
        .password-card.copied::after {
            content: "✓ COPIED";
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff0000;
            color: white;
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .slider-container {
            scroll-snap-type: x mandatory;
            overflow-x: auto;
            display: flex;
            gap: 1rem;
            padding: 0.5rem 0.25rem;
            scroll-behavior: smooth;
        }
        
        .slider-container::-webkit-scrollbar {
            height: 6px;
        }
        
        .match-badge {
            background: linear-gradient(135deg, #ff0055 0%, #7000ff 100%);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            display: inline-block;
        }
        
        .nav-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .nav-button:hover:not(:disabled) {
            background: rgba(255, 0, 85, 0.2);
            border-color: #ff0055;
            transform: scale(1.1);
        }
        
        .nav-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .history-indicator {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 165, 0, 0.2);
            border: 1px solid rgba(255, 165, 0, 0.3);
            color: orange;
        }
        
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }
        
        .copy-success {
            animation: pulse-green 0.5s ease;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-left">
            <h1 class="mono text-2xl md:text-4xl font-bold tracking-tighter italic">
                <span class="text-transparent bg-clip-text accent-gradient">XREZZKY</span> Ω-CHECKER
            </h1>
            <p class="text-gray-500 mono text-[10px] uppercase tracking-widest">V37.0 - 1x MUNDUR EDITION</p>
        </div>
        <div class="flex gap-2">
            <button onclick="clearAll()" class="glass px-4 py-2 rounded-xl text-xs hover:bg-white/5 transition-all">
                <i class="fas fa-trash-alt mr-2"></i> CLEAR ALL
            </button>
            <button onclick="processData()" class="accent-gradient px-4 py-2 rounded-xl text-xs font-bold hover:scale-105 transition-all">
                <i class="fas fa-bolt mr-2"></i> PROCESS
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- LEFT PANEL - INPUT -->
        <div class="lg:col-span-4 space-y-4">
            <div class="glass p-5 rounded-3xl relative overflow-hidden">
                <h2 class="text-lg font-bold flex items-center gap-2 mb-4">
                    <i class="fas fa-microchip text-purple-500"></i> INPUT DATA
                </h2>
                
                <div class="space-y-4">
                    <!-- USER INPUT -->
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-[10px] mono text-gray-400">USERNAMES</label>
                            <span id="user-count" class="text-[10px] text-purple-400 mono">0</span>
                        </div>
                        <textarea id="user-input" rows="4" class="w-full bg-black/40 border border-white/5 rounded-2xl p-4 focus:outline-none focus:border-purple-500/50 mono text-sm custom-scrollbar" placeholder="user1&#10;user2">daniel
justin
robert
robe</textarea>
                    </div>

                    <!-- PASSWORD INPUT with EXAMPLE -->
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-[10px] mono text-gray-400">PASSWORDS</label>
                            <span id="pass-count" class="text-[10px] text-pink-400 mono">0</span>
                        </div>
                        <textarea id="pass-input" rows="6" class="w-full bg-black/40 border border-white/5 rounded-2xl p-4 focus:outline-none focus:border-pink-500/50 mono text-sm custom-scrollbar" placeholder="password1&#10;password2">'daniel20122012', 'just20122012', 'robert12', 'robe3636', 'just18', 'justin20122012', 'just1234', 'robert1234', 'robe1234', 'just123', 'robert123', 'robe12', 'justin12', 'robert20122012', 'robert3636', 'justin123', 'just3636', 'just12', 'daniel1234', 'daniel18', 'daniel3636', 'daniel12', 'robe18', 'robe123', 'robert18', 'justin3636', 'justin18', 'daniel123', 'robe20122012', 'justin1234'</textarea>
                        <p class="text-[8px] text-green-400 mt-1 flex items-center gap-1">
                            <i class="fas fa-check-circle"></i> AUTO CLEAN: 'text' → text
                        </p>
                    </div>

                    <!-- MATCH THRESHOLD -->
                    <div class="glass-dark p-4 rounded-2xl">
                        <label class="text-xs text-gray-400 block mb-2">MINIMUM MATCH SCORE</label>
                        <input type="range" id="match-threshold" min="0" max="100" value="30" class="w-full accent-pink-600" oninput="updateThresholdLabel()">
                        <div class="flex justify-between mt-1">
                            <span class="text-[10px] text-gray-600">0%</span>
                            <span id="threshold-value" class="text-[10px] text-pink-400 font-bold">30%</span>
                            <span class="text-[10px] text-gray-600">100%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL - RESULTS -->
        <div class="lg:col-span-8 space-y-4">
            <!-- USER LIST -->
            <div class="glass rounded-2xl p-5">
                <h3 class="text-sm font-bold mb-3 flex items-center gap-2">
                    <i class="fas fa-users text-blue-500"></i> USER LIST
                </h3>
                <div id="user-list" class="flex flex-wrap gap-2 min-h-[60px] max-h-[120px] overflow-y-auto custom-scrollbar p-2">
                    <div class="text-gray-600 text-sm w-full text-center">Belum ada user. Klik PROCESS!</div>
                </div>
            </div>

            <!-- SELECTED USER INFO & PASSWORD SLIDER -->
            <div class="glass rounded-[2rem] overflow-hidden">
                <!-- Selected User Header -->
                <div class="p-5 border-b border-white/5 bg-gradient-to-r from-purple-500/10 to-pink-500/10">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[10px] text-gray-500">SELECTED USER</p>
                            <h2 id="selected-user-display" class="text-2xl font-bold mono">-</h2>
                        </div>
                        <div class="flex items-center gap-2">
                            <!-- History indicator -->
                            <div id="history-indicator" class="history-indicator" style="display: none;">
                                <i class="fas fa-history mr-1"></i> <span id="history-status">Bisa mundur 1x</span>
                            </div>
                            <!-- Copy all button (disabled di versi ini) -->
                            <button disabled class="glass px-4 py-2 rounded-xl text-xs opacity-30 cursor-not-allowed">
                                <i class="fas fa-ban mr-2"></i> 1x MUNDUR ONLY
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Navigation Controls -->
                <div class="px-5 pt-4 flex justify-between items-center">
                    <h3 class="text-sm font-bold flex items-center gap-2">
                        <i class="fas fa-key text-pink-500"></i> PASSWORD SLIDER
                    </h3>
                    <div class="flex gap-2">
                        <button id="prev-btn" class="nav-button" onclick="slidePrev()" disabled>
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="password-counter" class="text-xs bg-white/10 px-3 py-1 rounded-full flex items-center">0/0</span>
                        <button id="next-btn" class="nav-button" onclick="slideNext()" disabled>
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>

                <!-- Password Slider -->
                <div class="p-5 pt-2">
                    <div id="password-slider-container" class="relative">
                        <!-- Slider -->
                        <div id="password-slider" class="slider-container custom-scrollbar" style="display: none;">
                            <!-- Password cards akan diisi oleh JS -->
                        </div>

                        <!-- Empty State -->
                        <div id="no-password-selected" class="text-center py-10 opacity-50">
                            <i class="fas fa-arrow-left text-3xl mb-3"></i>
                            <p class="text-sm">Pilih user dulu dari daftar di atas</p>
                        </div>
                    </div>
                </div>

                <!-- Current Password Display -->
                <div class="px-5 pb-5">
                    <div class="glass-dark p-4 rounded-xl">
                        <p class="text-[8px] text-gray-500 mb-1">CURRENT SELECTION</p>
                        <div class="flex justify-between items-center">
                            <div>
                                <span id="current-user-display" class="mono text-sm font-bold">-</span>
                                <span class="text-gray-600 mx-1">:</span>
                                <span id="current-pass-display" class="mono text-sm text-pink-400">-</span>
                            </div>
                            <button id="copy-current-btn" onclick="copyCurrentPassword()" class="bg-pink-600 hover:bg-pink-700 px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2">
                                <i class="fas fa-copy"></i> COPY THIS
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass px-8 py-3 rounded-full text-xs font-bold opacity-0 transition-all translate-y-10 pointer-events-none z-50 border border-white/10">
        <span id="toast-msg">SYSTEM READY</span>
    </div>

    <script>
        // ==================== DATA STORE ====================
        let users = [];
        let passwords = [];
        let matches = []; // [{ user, password, score }]
        let selectedUser = null;
        let copiedCombos = new Set(); // Untuk tracking yang udah dicopy
        
        // Slider state
        let currentIndex = 0;
        let lastIndex = -1; // Untuk tracking mundur 1x
        let hasMundur = false; // Apakah sudah pernah mundur?

        // ==================== UTILITY FUNCTIONS ====================
        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0');
            }, duration);
        }

        function cleanQuotes(text) {
            // Hilangkan kutip di awal dan akhir, juga koma
            return text.replace(/^['"]|['"]$|,$/g, '').trim();
        }

        function parseInput(input) {
            // Pisah berdasarkan koma atau newline
            const items = input.split(/[,\n]/)
                .map(item => item.trim())
                .filter(item => item.length > 0)
                .map(item => cleanQuotes(item));
            return items;
        }

        function updateCounts() {
            const rawUsers = document.getElementById('user-input').value;
            const rawPasses = document.getElementById('pass-input').value;
            
            const userItems = parseInput(rawUsers);
            const passItems = parseInput(rawPasses);
            
            document.getElementById('user-count').innerText = userItems.length;
            document.getElementById('pass-count').innerText = passItems.length;
        }

        function updateThresholdLabel() {
            const val = document.getElementById('match-threshold').value;
            document.getElementById('threshold-value').innerText = val + '%';
        }

        // ==================== SIMILARITY CALCULATION ====================
        function calculateSimilarity(user, password) {
            const u = user.toLowerCase();
            const p = password.toLowerCase();
            
            if (u === p) return 100;
            
            let score = 0;
            
            // User ada di dalam password atau sebaliknya
            if (p.includes(u) || u.includes(p)) score += 50;
            
            // Prefix match
            let prefixCount = 0;
            for (let i = 0; i < Math.min(u.length, p.length); i++) {
                if (u[i] === p[i]) prefixCount++;
                else break;
            }
            score += (prefixCount * 5);
            
            // Number match
            const uNums = u.replace(/\D/g, '');
            const pNums = p.replace(/\D/g, '');
            if (uNums && pNums) {
                if (uNums === pNums) score += 30;
                else if (uNums.includes(pNums) || pNums.includes(uNums)) score += 15;
            }
            
            return Math.min(Math.round(score), 100);
        }

        // ==================== PROCESS DATA ====================
        function processData() {
            // Parse users
            const rawUsers = document.getElementById('user-input').value;
            users = parseInput(rawUsers);
            
            // Parse passwords
            const rawPasswords = document.getElementById('pass-input').value;
            passwords = parseInput(rawPasswords);
            
            if (users.length === 0 || passwords.length === 0) {
                showToast('ISI USERNAME DAN PASSWORD DULU!', 3000);
                return;
            }

            const threshold = parseInt(document.getElementById('match-threshold').value);

            // Hitung semua kemungkinan match
            matches = [];
            users.forEach(user => {
                passwords.forEach(password => {
                    const score = calculateSimilarity(user, password);
                    if (score >= threshold) {
                        matches.push({ user, password, score });
                    }
                });
            });

            // Urutin per user biar yang paling tinggi di atas
            matches.sort((a, b) => {
                if (a.user === b.user) return b.score - a.score;
                return a.user.localeCompare(b.user);
            });

            // Update UI
            updateUserList();

            // Reset selected user
            selectedUser = null;
            currentIndex = 0;
            lastIndex = -1;
            hasMundur = false;
            
            document.getElementById('selected-user-display').innerText = '-';
            document.getElementById('current-user-display').innerText = '-';
            document.getElementById('current-pass-display').innerText = '-';
            document.getElementById('password-slider').style.display = 'none';
            document.getElementById('no-password-selected').style.display = 'block';
            document.getElementById('history-indicator').style.display = 'none';
            document.getElementById('prev-btn').disabled = true;
            document.getElementById('next-btn').disabled = true;
            document.getElementById('password-counter').innerText = '0/0';

            showToast(`✅ DITEMUKAN ${matches.length} KOMBINASI`, 2000);
        }

        // ==================== UPDATE USER LIST ====================
        function updateUserList() {
            const container = document.getElementById('user-list');
            container.innerHTML = '';

            if (users.length === 0) {
                container.innerHTML = '<div class="text-gray-600 text-sm w-full text-center">Belum ada user. Isi username dulu!</div>';
                return;
            }

            // Group matches by user untuk ngitung jumlah password per user
            const matchCountByUser = {};
            matches.forEach(m => {
                if (!matchCountByUser[m.user]) matchCountByUser[m.user] = 0;
                matchCountByUser[m.user]++;
            });

            users.forEach(user => {
                const matchCount = matchCountByUser[user] || 0;
                const isSelected = (selectedUser === user);
                
                const userElement = document.createElement('div');
                userElement.className = `user-item glass px-4 py-2 rounded-xl text-sm flex items-center gap-2 ${isSelected ? 'selected' : ''}`;
                userElement.setAttribute('data-user', user);
                userElement.onclick = () => selectUser(user);
                
                userElement.innerHTML = `
                    <span class="mono truncate max-w-[150px]">${user}</span>
                    <span class="text-[10px] ${matchCount > 0 ? 'bg-pink-500/20' : 'bg-gray-500/20'} px-2 py-0.5 rounded-full ml-auto">${matchCount}</span>
                `;
                
                container.appendChild(userElement);
            });
        }

        // ==================== SELECT USER ====================
        function selectUser(user) {
            selectedUser = user;
            document.getElementById('selected-user-display').innerText = user;
            
            // Update selected state di user list
            document.querySelectorAll('.user-item').forEach(el => {
                if (el.getAttribute('data-user') === user) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });

            // Filter matches untuk user ini
            const userMatches = matches.filter(m => m.user === user);
            
            if (userMatches.length > 0) {
                // Reset slider state
                currentIndex = 0;
                lastIndex = -1;
                hasMundur = false;
                
                // Tampilkan slider
                document.getElementById('password-slider').style.display = 'flex';
                document.getElementById('no-password-selected').style.display = 'none';
                document.getElementById('history-indicator').style.display = 'flex';
                document.getElementById('history-status').innerText = 'Bisa mundur 1x';
                
                renderPasswordSlider(userMatches);
                updateCurrentDisplay(userMatches);
                updateNavButtons(userMatches.length);
            } else {
                // Ga ada password yang cocok
                document.getElementById('password-slider').style.display = 'none';
                document.getElementById('no-password-selected').style.display = 'block';
                document.getElementById('no-password-selected').innerHTML = `
                    <i class="fas fa-exclamation-triangle text-3xl mb-3"></i>
                    <p class="text-sm">Tidak ada password yang cocok untuk user ini</p>
                `;
                document.getElementById('history-indicator').style.display = 'none';
                document.getElementById('current-user-display').innerText = '-';
                document.getElementById('current-pass-display').innerText = '-';
                document.getElementById('prev-btn').disabled = true;
                document.getElementById('next-btn').disabled = true;
                document.getElementById('password-counter').innerText = '0/0';
            }
        }

        // ==================== RENDER PASSWORD SLIDER ====================
        function renderPasswordSlider(userMatches) {
            const slider = document.getElementById('password-slider');
            slider.innerHTML = '';

            userMatches.forEach((match, index) => {
                const combo = `${match.user}:${match.password}`;
                const isCopied = copiedCombos.has(combo);
                
                const card = document.createElement('div');
                card.className = `password-card glass p-4 rounded-xl border ${isCopied ? 'copied' : 'border-white/10'}`;
                card.setAttribute('data-combo', combo);
                card.setAttribute('data-index', index);
                card.setAttribute('data-password', match.password);
                card.setAttribute('data-score', match.score);
                
                // Match badge color based on score
                let badgeClass = 'from-green-500 to-green-600';
                if (match.score < 60) badgeClass = 'from-yellow-500 to-yellow-600';
                if (match.score < 40) badgeClass = 'from-red-500 to-red-600';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="match-badge bg-gradient-to-r ${badgeClass}">${match.score}% match</span>
                    </div>
                    <div class="mono text-sm mb-4 break-all min-h-[60px]">${match.password}</div>
                    <div class="text-[8px] text-gray-500 text-right">
                        #${index + 1}
                    </div>
                `;
                
                // Klik card untuk pilih password ini
                card.onclick = () => {
                    const idx = parseInt(card.getAttribute('data-index'));
                    goToIndex(idx, userMatches);
                };
                
                slider.appendChild(card);
            });

            // Scroll ke index yang aktif
            setTimeout(() => {
                const cards = slider.children;
                if (cards.length > 0 && currentIndex < cards.length) {
                    cards[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
                }
            }, 100);
        }

        // ==================== UPDATE CURRENT DISPLAY ====================
        function updateCurrentDisplay(userMatches) {
            if (userMatches.length > 0 && currentIndex < userMatches.length) {
                const current = userMatches[currentIndex];
                document.getElementById('current-user-display').innerText = current.user;
                document.getElementById('current-pass-display').innerText = current.password;
                document.getElementById('password-counter').innerText = `${currentIndex + 1}/${userMatches.length}`;
            }
        }

        // ==================== UPDATE NAV BUTTONS ====================
        function updateNavButtons(totalItems) {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            // Prev: bisa kalau bukan index 0 DAN (belum pernah mundur ATAU mundur terakhir dari index yang berbeda)
            const canPrev = currentIndex > 0;
            prevBtn.disabled = !canPrev;
            
            // Next: bisa kalau bukan index terakhir
            const canNext = currentIndex < totalItems - 1;
            nextBtn.disabled = !canNext;
            
            // Update history indicator
            if (lastIndex !== -1 && currentIndex === lastIndex) {
                document.getElementById('history-status').innerText = 'Sedang di posisi mundur';
                document.getElementById('history-indicator').style.background = 'rgba(255, 165, 0, 0.3)';
            } else {
                document.getElementById('history-status').innerText = hasMundur ? 'Sudah pernah mundur' : 'Bisa mundur 1x';
                document.getElementById('history-indicator').style.background = 'rgba(255, 165, 0, 0.2)';
            }
        }

        // ==================== GO TO INDEX ====================
        function goToIndex(index, userMatches) {
            if (!userMatches) {
                userMatches = matches.filter(m => m.user === selectedUser);
            }
            
            if (index >= 0 && index < userMatches.length) {
                currentIndex = index;
                updateCurrentDisplay(userMatches);
                updateNavButtons(userMatches.length);
                
                // Scroll ke card yang dipilih
                const slider = document.getElementById('password-slider');
                const cards = slider.children;
                if (cards.length > index) {
                    cards[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
                }
            }
        }

        // ==================== SLIDE NAVIGATION ====================
        function slidePrev() {
            const userMatches = matches.filter(m => m.user === selectedUser);
            if (!userMatches.length) return;
            
            if (currentIndex > 0) {
                // Simpan index sebelumnya untuk tracking mundur
                if (!hasMundur && currentIndex > 0) {
                    lastIndex = currentIndex;
                    hasMundur = true;
                }
                
                currentIndex--;
                updateCurrentDisplay(userMatches);
                updateNavButtons(userMatches.length);
                
                // Scroll
                const slider = document.getElementById('password-slider');
                const cards = slider.children;
                if (cards.length > currentIndex) {
                    cards[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
                }
            }
        }

        function slideNext() {
            const userMatches = matches.filter(m => m.user === selectedUser);
            if (!userMatches.length) return;
            
            if (currentIndex < userMatches.length - 1) {
                currentIndex++;
                updateCurrentDisplay(userMatches);
                updateNavButtons(userMatches.length);
                
                // Scroll
                const slider = document.getElementById('password-slider');
                const cards = slider.children;
                if (cards.length > currentIndex) {
                    cards[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
                }
            }
        }

        // ==================== COPY CURRENT PASSWORD ====================
        function copyCurrentPassword() {
            if (!selectedUser) {
                showToast('PILIH USER DULU!', 1500);
                return;
            }

            const userMatches = matches.filter(m => m.user === selectedUser);
            if (userMatches.length === 0 || currentIndex >= userMatches.length) return;

            const current = userMatches[currentIndex];
            const combo = `${current.user}:${current.password}`;
            
            // Cek udah pernah dicopy
            if (copiedCombos.has(combo)) {
                showToast('❌ SUDAH PERNAH DI COPY!', 1500);
                return;
            }

            // Copy ke clipboard
            navigator.clipboard.writeText(combo).then(() => {
                // Tandai sebagai copied
                copiedCombos.add(combo);
                
                // Update card visual
                const slider = document.getElementById('password-slider');
                const cards = slider.children;
                if (cards.length > currentIndex) {
                    cards[currentIndex].classList.add('copied');
                }
                
                // Animasi button
                const copyBtn = document.getElementById('copy-current-btn');
                copyBtn.innerHTML = '<i class="fas fa-check"></i> COPIED!';
                copyBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                copyBtn.disabled = true;
                
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> COPY THIS';
                    copyBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                    copyBtn.classList.add('bg-pink-600', 'hover:bg-pink-700');
                    copyBtn.disabled = false;
                }, 2000);
                
                showToast(`✅ COPIED: ${combo}`, 1500);
            }).catch(err => {
                showToast('❌ GAGAL COPY!', 1500);
            });
        }

        // ==================== CLEAR ALL ====================
        function clearAll() {
            if (confirm('Yakin mau hapus semua data?')) {
                document.getElementById('user-input').value = '';
                document.getElementById('pass-input').value = '';
                document.getElementById('user-list').innerHTML = '<div class="text-gray-600 text-sm w-full text-center">Belum ada user. Klik PROCESS!</div>';
                document.getElementById('selected-user-display').innerText = '-';
                document.getElementById('current-user-display').innerText = '-';
                document.getElementById('current-pass-display').innerText = '-';
                document.getElementById('password-slider').style.display = 'none';
                document.getElementById('no-password-selected').style.display = 'block';
                document.getElementById('no-password-selected').innerHTML = `
                    <i class="fas fa-arrow-left text-3xl mb-3"></i>
                    <p class="text-sm">Pilih user dulu dari daftar di atas</p>
                `;
                document.getElementById('history-indicator').style.display = 'none';
                document.getElementById('prev-btn').disabled = true;
                document.getElementById('next-btn').disabled = true;
                document.getElementById('password-counter').innerText = '0/0';
                
                users = [];
                passwords = [];
                matches = [];
                selectedUser = null;
                copiedCombos.clear();
                currentIndex = 0;
                lastIndex = -1;
                hasMundur = false;
                
                updateCounts();
                showToast('🧹 SEMUA DIHAPUS', 1500);
            }
        }

        // ==================== INIT ====================
        document.getElementById('user-input').addEventListener('input', updateCounts);
        document.getElementById('pass-input').addEventListener('input', updateCounts);
        
        // Auto-update threshold label
        updateThresholdLabel();

        // Auto process on load with sample data
        window.onload = function() {
            // Auto clean and process
            setTimeout(() => {
                processData();
                updateCounts();
            }, 500);
        };
    </script>
</body>
</html>
